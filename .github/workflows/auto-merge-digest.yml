name: Auto-merge digest branch into main

# Fires whenever the Routine pushes a new claude/*-prefixed branch.
# Only acts on commits whose message starts with "Digest:" (set by the
# Routine prompt), so other claude/* branches you might create manually
# or via other tools are left untouched.

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'Digest:') || startsWith(github.event.head_commit.message, 'Newsletter:')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Fast-forward main to the digest branch
        run: |
          git fetch origin "${{ github.ref_name }}"
          # The Routine always clones fresh from main, so the digest
          # branch is guaranteed to be a direct descendant of main.
          # This is a plain fast-forward push, not a merge commit.
          git push origin "origin/${{ github.ref_name }}:main"

      - name: Delete the digest branch
        run: |
          git push origin --delete "${{ github.ref_name }}"
